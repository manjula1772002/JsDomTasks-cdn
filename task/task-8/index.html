<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password-View</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="w-full bg-green-50">
    <section class="bg-white rounded-2xl shadow-2xl p-8 w-fit m-auto mt-4">
        <div class="text-center mb-8">
        <h1 class="text-2xl">Welcome</h1>
        <p>Sign in to account</p>
        </div>
        <form action="" class="space-y-5">
            <div>
                <label class="text-sm mb-2 text-gray-700">Email
                </label>
                <input type="mail" id="mail" required placeholder="your@email.com"
                class="w-full pl-11 pr-4 py-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
            </div>

            <div>
                <label for="password"  class="text-sm mb-2 text-gray-700">Password</label>
                <div class="flex gap-3 justify-center "><input type="password" id="password" required placeholder="Enter password" class="w-full pl-11 pr-11 py-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
                <input id="checkbox" type="checkbox" placeholder="show" class="text-right text-gray-700"></div>
            </div>
            
            <button type="button" id="submit" class="w-full cursor-pointer bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition-colors shadow-md hover:shadow-lg">Submit</button>
        </form>


    </section>
    <script type="module" src="main.js"></script>
</body>

</html>
