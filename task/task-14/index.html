<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Bar</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="flex flex-col items-center justify-center text-center mb-8">

  <h1 class="text-3xl font-bold text-green-700 mb-4">
    Vegetables
  </h1>

  <div class="relative flex items-center">
    <input
      id="input"
      type="text"
      placeholder="Search"
      class="w-64 px-4 py-2 pr-10 text-sm text-gray-600 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-green-500"
    />
    <!-- <button class="absolute right-3 " id="search">
      <img
        src="./assets/search.svg"
        alt="search"
        class="w-4 h-4"
      />
    </button> -->
  </div>

</header>

    <section class="grid grid-cols-4  gap-6 p-8 bg-gray-200 font-sans">
      
        <div class="bg-white p-5 rounded-xl division ">
            <h1 class="text-lg font-semibold text-green-700 border-b pb-2 mb-3 " >
                Root Vegetables
            </h1>
            <ul class="space-y-2 text-gray-700 list">
                <li>Carrot</li>
                <li>Beetroot</li>
                <li>Radish</li>
                <li>Sweet Potato</li>
                <li>Potato</li>
                <li>Onion</li>
                <li>Garlic</li>
            </ul>
        </div>


        <div class="bg-white p-5 rounded-xl division">
            <h1 class="text-lg font-semibold text-green-700 border-b pb-2 mb-3 ">
                Leafy Greens
            </h1>
            <ul class="space-y-2 text-gray-700 list">
                <li>Spinach</li>
                <li>Lettuce</li>
                <li>Cabbage</li>
                <li>Kale</li>
            </ul>
        </div>


        <div class="bg-white p-5 rounded-xl division ">
            <h1 class="text-lg font-semibold text-green-700 border-b pb-2 mb-3 ">
                Stem Vegetables
            </h1>
            <ul class="space-y-2 text-gray-700 list">
                <li>Celery</li>
                <li>Asparagus</li>
                <li>Leeks</li>
                <li>Ginger</li>
            </ul>
        </div>

        <div class="bg-white p-5 rounded-xl division">
            <h1 class="text-lg font-semibold text-green-700 border-b pb-2 mb-3 ">
                Flower Vegetables 
            </h1>
            <ul class="space-y-2 text-gray-700 list">
                <li>Broccoli</li>
                <li>Cauliflower</li>
                <li>Artichoke</li>
            </ul>
        </div>


    </section>
     <footer class="w-full text-center"><a href="/"><button class="bg-green-700 hover:bg-green-800 rounded px-3 py-1 m-3 text-center items-center">Back</button></a></footer>
    


    <script type="module" src="main.js"></script>
</body>

</html>
