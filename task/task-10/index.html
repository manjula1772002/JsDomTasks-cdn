<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart</title>
  <link rel="stylesheet" href="/task/task-10/style.css" />
</head>

<body class="bg-gray-100 min-h-screen">
  <!-- header -->
  <header class="bg-white shadow">
    <nav class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-3xl font-bold text-green-700">MyCart</h1>

      <ul class="flex gap-6 text-green-700 font-medium">
        <li class="cursor-pointer hover:bg-green-700 hover:text-white px-3 py-1 rounded">
          Home
        </li>
        <li class="cursor-pointer hover:bg-green-700 hover:text-white px-3 py-1 rounded">
          Products
        </li>
      </ul>
    </nav>
  </header>

  <section class="mb-3">
    <!-- page title -->
    <h2 class="text-center text-3xl font-bold mt-2 text-gray-700">
      Fresh Fruits
    </h2>

    <!-- Fruits  -->
    <div class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8 mt-10 px-6">
      <!-- apple -->
      <div class="fruit bg-white p-6 rounded-2xl shadow hover:shadow-lg transition text-center" data-price="50">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/15/Red_Apple.jpg"
          class="w-24 h-24 mx-auto rounded-full object-cover ring-2 ring-gray-200" />

        <h3 class="font-semibold text-lg mt-3">Apple</h3>

        <p class="text-gray-500 text-sm">₹50 each</p>

        <div class="flex justify-center items-center gap-4 mt-4">
          <button class="minus border px-3 rounded hover:bg-gray-200">
            −
          </button>
          <span class="count font-semibold">0</span>
          <button class="plus border px-3 rounded hover:bg-gray-200">
            +
          </button>
        </div>

        <p class="text-sm text-gray-500 mt-3">Total</p>
        <p class="total font-bold text-lg">₹ 0</p>
      </div>

      <!-- banana -->
      <div class="fruit bg-white p-6 rounded-2xl shadow hover:shadow-lg transition text-center" data-price="10">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/8a/Banana-Single.jpg"
          class="w-24 h-24 mx-auto rounded-full object-cover ring-2 ring-gray-200" />

        <h3 class="font-semibold text-lg mt-3">Banana</h3>

        <p class="text-gray-500 text-sm">₹10 each</p>

        <div class="flex justify-center items-center gap-4 mt-4">
          <button class="minus border px-3 rounded hover:bg-gray-200">
            −
          </button>
          <span class="count font-semibold">0</span>
          <button class="plus border px-3 rounded hover:bg-gray-200">
            +
          </button>
        </div>

        <p class="text-sm text-gray-500 mt-3">Total</p>
        <p class="total font-bold text-lg">₹ 0</p>
      </div>

      <!-- orange -->
      <div class="fruit bg-white p-6 rounded-2xl shadow hover:shadow-lg transition text-center" data-price="30">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c4/Orange-Fruit-Pieces.jpg"
          class="w-24 h-24 mx-auto rounded-full object-cover ring-2 ring-gray-200" />

        <h3 class="font-semibold text-lg mt-3">Orange</h3>

        <p class="text-gray-500 text-sm">₹30 each</p>

        <div class="flex justify-center items-center gap-4 mt-4">
          <button class="minus border px-3 rounded hover:bg-gray-200">
            −
          </button>
          <span class="count font-semibold">0</span>
          <button class="plus border px-3 rounded hover:bg-gray-200">
            +
          </button>
        </div>

        <p class="text-sm text-gray-500 mt-3">Total</p>
        <p class="total font-bold text-lg">₹ 0</p>
      </div>

      <!-- grapes -->
      <div class="fruit bg-white p-6 rounded-2xl shadow hover:shadow-lg transition text-center" data-price="40">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/bb/Table_grapes_on_white.jpg"
          class="w-24 h-24 mx-auto rounded-full object-cover ring-2 ring-gray-200" />

        <h3 class="font-semibold text-lg mt-3">Grapes</h3>

        <p class="text-gray-500 text-sm">₹40 each</p>

        <div class="flex justify-center items-center gap-4 mt-4">
          <button class="minus border px-3 rounded hover:bg-gray-200">
            −
          </button>
          <span class="count font-semibold">0</span>
          <button class="plus border px-3 rounded hover:bg-gray-200">
            +
          </button>
        </div>

        <p class="text-sm text-gray-500 mt-3">Total</p>
        <p class="total font-bold text-lg">₹ 0</p>
      </div>
    </div>

    <!-- Total -->
    <div class="text-center mt-12 text-2xl font-bold">
      Cart Total : ₹ <span id="cartTotal" class="text-red-600">0</span>
    </div>
  </section>

  <script type="module" src="/task/task-10/main.js"></script>
</body>

</html>
