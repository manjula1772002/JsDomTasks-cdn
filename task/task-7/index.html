<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>textarea</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <section class="bg-slate flex flex-col justify-center text-center h-[100vh] bg-blue-200">
        <h1 class="text-4xl font-medium">Text Format</h1>
        <div class="flex flex-col justify-center items-center">
            <label for="text" class="font-light text-2xl">Enter a text</label>
            <textarea id="TextArea" required class="w-full md:w-150 h-75 rounded-xl outline-none  bg-slate-200 p-3"></textarea>
        </div>
        <div id="error" class="text-red-700"></div>
        <div class=" flex gap-5 items-center justify-center mt-2">
            <button id="toUpperCaseText" class="button px-2 py-1  font-medium rounded ">UPPERCASE</button>
            <button id="toLowerCaseText" class="button px-2 py-1  font-medium rounded " >lowercase</button>
            <button id="clearText" class="px-2 py-1 font-medium rounded text-red-500 cursor-pointer hover:text-white hover:bg-red-500">CLEAR</button>
        </div>
        
    </section>
    <script type="module" src="./main.js"></script>
</body>

</html>
