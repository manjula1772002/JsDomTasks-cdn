<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark/Light</title>
  <script type="module" crossorigin src="/assets/task11-CpgFeBpJ.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="stylesheet" crossorigin href="/assets/task11-DIM_UsVm.css">
</head>

<body class="w-full bg-white">
  <header class="flex justify-around py-2 mx-4">
    <div><a href="/"><button type="button" class="bg-white px-3  py-2 hover:bg-green-600  rounded"><img
            src="data:image/svg+xml,%3csvg%20xmlns='http://www.w3.org/2000/svg'%20height='24px'%20viewBox='0%20-960%20960%20960'%20width='24px'%20fill='%231f1f1f'%3e%3cpath%20d='m313-440%20224%20224-57%2056-320-320%20320-320%2057%2056-224%20224h487v80H313Z'/%3e%3c/svg%3e" alt="back" class="w-4 h-4"></button></a></div>
    <div><button type="button" id="Toggle" class="hover:bg-green-600 px-2 py-1 rounded">🌙</button></div>
  </header>
  <section id="card" class="rounded-2xl shadow-2xl p-8 w-fit m-auto mt-4 bg-green-50">
    <div class="text-center mb-8">
      <h1 class="text-2xl">Welcome</h1>
      <p>Sign in to account</p>
    </div>
    <form class="flex flex-col gap-2">
      <div>
        <label class="text-sm mb-2 text-gray-700">Email </label>
        <input type="mail" id="mail" required placeholder="your@email.com"
          class="w-full pl-11 pr-4 py-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent" />
      </div>

      <div class="mb-3">
        <label for="password" class="text-sm mb-2 text-gray-700">Password</label>
        <div class="flex gap-3 justify-center">
          <input type="password" id="password" required placeholder="Enter password"
            class="w-full pl-11 pr-11 py-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent" />
        </div>
      </div>
      <div>
        <button id="submit"
          class="w-full cursor-pointer bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition-colors shadow-md hover:shadow-lg">
          Submit
        </button>
      </div>
    </form>
  </section>
</body>

</html>
