<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maths Easy</title>
  <script type="module" crossorigin src="/assets/task16-DOvGnzBn.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="stylesheet" crossorigin href="/assets/task16-YeadUMsv.css">
</head>

<body class="bg-amber-50 ">
  <section class="max-w-sm m-auto rounded mt-2 p-4 bg-white">
    <div class="bg-white p-4 rounded-2xl">
      <h1 class="uppercase text-3xl text-left font-medium mb-0">
        Maths Easy
      </h1>
    </div>
    <div class="text-right m-2 bg-slate-200 p-2 rounded">
    
     <div  id="display" class="text-3xl">0</div>
    </div>
    <div class="buttons flex flex-col gap-2 space-y-1">
      <div class="grid grid-cols-4">
        <button class="rounded py-3  text-xl font-semibold" id="clearOperands">Clear</button>
        <button class="btnStyle">(</button>
        <button class="btnStyle">)</button>
        <button class="equal">=</button>
      </div>

      <div class="grid grid-cols-4">
        <button class="btnNum">7</button>
        <button class="btnNum">8</button>
        <button class="btnNum">9</button>
        <button class="operator">+</button>
      </div>

      <div class="grid grid-cols-4">
        <button class="btnNum">4</button>
        <button class="btnNum">5</button>
        <button class="btnNum">6</button>
        <button class="operator">-</button>
      </div>

      <div class="grid grid-cols-4">
        <button class="btnNum">1</button>
        <button class="btnNum">2</button>
        <button class="btnNum">3</button>
        <button class="operator">*</button>
      </div>

      <div class="grid grid-cols-4">
        <button class="clear text-2xl">x</button>
        <button class="dot">.</button>
        <button class="btnNum">0</button>
        <button class="operator">/</button>
      </div>
    </div>
  </section>

</body>

</html>
